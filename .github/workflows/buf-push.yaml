name: Buf Push
on:
  push:
    branches:
      - main
    paths:
      - "**.proto"
      - "**/buf.yaml"
      - "**/buf.lock"
permissions:
  contents: read
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
